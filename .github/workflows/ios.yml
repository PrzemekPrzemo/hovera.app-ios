name: iOS
on:
  pull_request:
    branches: [main, claude/build-mobile-apps-tj3kb]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Show Xcode + simulator inventory
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | head -60

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Hovera \
            -derivedDataPath build/derived

      - name: Build (generic iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Hovera \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO

      # Resolve a concrete simulator UDID via jq (preinstalled on
      # macos runners). First try preferred names; if none of those
      # exist on the image, fall back to whatever iOS simulator IS
      # available so the workflow keeps green as images change.
      - name: Pick simulator
        id: sim
        run: |
          INV=$(xcrun simctl list devices available --json)
          ID=$(echo "$INV" | jq -r '
            .devices
            | to_entries
            | map(select(.key | test("iOS")))
            | map(.value[])
            | map(select(.isAvailable))
            | map(select(.name == "iPhone 16" or .name == "iPhone 15" or .name == "iPhone SE (3rd generation)"))
            | .[0].udid // empty
          ')
          if [ -z "$ID" ]; then
            echo "::warning::No preferred device available; falling back to first available iOS simulator."
            ID=$(echo "$INV" | jq -r '
              .devices
              | to_entries
              | map(select(.key | test("iOS")))
              | map(.value[])
              | map(select(.isAvailable))
              | .[0].udid // empty
            ')
          fi
          if [ -z "$ID" ]; then
            echo "No iOS simulator available at all." >&2
            exit 1
          fi
          echo "Selected simulator UDID: $ID"
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Hovera \
            -destination 'platform=iOS Simulator,id=${{ steps.sim.outputs.id }}' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO
