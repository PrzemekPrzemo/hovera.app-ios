name: iOS
on:
  pull_request:
    branches: [main, claude/build-mobile-apps-tj3kb]
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          # Use whatever Xcode 16 is preinstalled on the macos-14 image.
          # Pinning to 15.4 broke because brew's xcodegen now emits
          # objectVersion 77 (Xcode 16-only project format).
          xcode-version: 'latest-stable'

      - name: Show Xcode + simulator inventory
        run: |
          xcodebuild -version
          xcrun simctl list runtimes
          xcrun simctl list devices available | head -50

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme Hovera \
            -derivedDataPath build/derived

      - name: Build (iPhone)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme Hovera \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO

      - name: Test (iPhone)
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Hovera \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO
